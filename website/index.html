<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitale Werkzeuge für die Sozialhilfe</title>
    <meta name="description" content="Digitale Apps und Werkzeuge für Fachkräfte in der Sozialhilfe. ICF Klassifikation Nachschlagewerk.">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: #fff;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            background: #0f1a24;
        }

        /* Accessibility toolbar */
        .a11y-bar {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 50;
            display: flex;
            gap: 6px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            padding: 6px;
        }

        .a11y-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .a11y-btn:hover, .a11y-btn:focus-visible {
            background: rgba(255, 255, 255, 0.18);
            color: #fff;
        }

        .a11y-btn.active {
            background: #009CDE;
            color: #fff;
        }

        /* High contrast mode */
        body.high-contrast .page-bg::after {
            background: rgba(0, 0, 0, 0.95) !important;
        }
        body.high-contrast .app-card,
        body.high-contrast .feature {
            background: #000 !important;
            border-color: #fff !important;
        }
        body.high-contrast .app-header .subtitle,
        body.high-contrast .app-description,
        body.high-contrast .tag,
        body.high-contrast .feature p,
        body.high-contrast .hero p,
        body.high-contrast footer,
        body.high-contrast footer a,
        body.high-contrast .platform {
            color: #fff !important;
        }
        body.high-contrast .btn-disabled {
            color: #aaa !important;
            border-color: #aaa !important;
        }

        /* Font size scaling */
        body.font-large { font-size: 125% !important; }
        body.font-large .hero h1 { font-size: 2.6rem !important; }
        body.font-large .app-header h2 { font-size: 1.7rem !important; }
        body.font-large .app-description, body.font-large .tag, body.font-large .feature p,
        body.font-large .hero p, body.font-large footer, body.font-large .app-header .subtitle,
        body.font-large .app-links a, body.font-large .btn-disabled { font-size: 1.05rem !important; }

        body.font-xlarge { font-size: 150% !important; }
        body.font-xlarge .hero h1 { font-size: 3rem !important; }
        body.font-xlarge .app-header h2 { font-size: 2rem !important; }
        body.font-xlarge .app-description, body.font-xlarge .tag, body.font-xlarge .feature p,
        body.font-xlarge .hero p, body.font-xlarge footer, body.font-xlarge .app-header .subtitle,
        body.font-xlarge .app-links a, body.font-xlarge .btn-disabled { font-size: 1.2rem !important; }
        body.font-xlarge .feature h3 { font-size: 1.2rem !important; }

        /* Skip link for keyboard users */
        .skip-link {
            position: absolute;
            top: -100px;
            left: 16px;
            background: #009CDE;
            color: white;
            padding: 8px 16px;
            border-radius: 0 0 8px 8px;
            z-index: 100;
            font-weight: 600;
            text-decoration: none;
        }
        .skip-link:focus { top: 0; }

        /* Focus styles */
        a:focus-visible, button:focus-visible, .platform:focus-visible {
            outline: 2px solid #009CDE;
            outline-offset: 3px;
        }

        /* Background */
        .page-bg {
            position: fixed;
            inset: -20px;
            z-index: 0;
            background: url('hero.jpg') center/cover no-repeat;
            filter: blur(4px);
            transform: scale(1.05);
        }

        .page-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                170deg,
                rgba(10, 18, 28, 0.88) 0%,
                rgba(12, 28, 44, 0.8) 40%,
                rgba(15, 32, 48, 0.78) 70%,
                rgba(10, 20, 35, 0.9) 100%
            );
        }

        .page-content {
            position: relative;
            z-index: 1;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Hero */
        .hero {
            padding: 80px 0 48px;
            text-align: center;
        }

        .hero h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        .hero p {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.85);
            max-width: 520px;
            margin: 0 auto;
        }

        /* App Card */
        .app-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
            margin-bottom: 24px;
        }

        .app-header {
            display: flex;
            gap: 24px;
            align-items: center;
            margin-bottom: 24px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 18px;
            flex-shrink: 0;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .app-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
        }

        .app-header .subtitle {
            color: rgba(255, 255, 255, 0.7);
            margin-top: 2px;
            font-size: 0.95rem;
        }

        .app-card-link {
            display: block;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            transition: all 0.25s;
        }

        .app-card-link .app-header {
            margin-bottom: 0;
        }

        .app-card-link:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
        }

        .chevron {
            margin-left: auto;
            opacity: 0.4;
            flex-shrink: 0;
            transition: all 0.25s;
        }

        .app-card-link:hover .chevron {
            opacity: 0.8;
            transform: translateX(4px);
        }

        .app-description {
            font-size: 0.98rem;
            margin-bottom: 24px;
            line-height: 1.75;
            color: rgba(255, 255, 255, 0.85);
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
        }

        .tag {
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .platforms {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 28px;
        }

        .platform {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: default;
            transition: all 0.2s;
        }

        .platform:hover, .platform:focus-visible {
            color: #fff;
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .app-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .app-links a {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .app-links a:hover {
            transform: translateY(-1px);
        }

        .btn-launch {
            background: linear-gradient(135deg, #009CDE, #0077a8);
            color: #fff;
            padding: 14px 32px !important;
            font-size: 1rem !important;
            border-radius: 12px !important;
            box-shadow: 0 4px 16px rgba(0, 156, 222, 0.3);
        }

        .btn-launch:hover {
            box-shadow: 0 6px 24px rgba(0, 156, 222, 0.45) !important;
            transform: translateY(-2px) scale(1.02) !important;
        }

        .btn-dark {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-dark:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        .btn-disabled {
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: default;
            pointer-events: none;
        }

        /* Features */
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 48px;
        }

        .feature {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 28px 16px;
            text-align: center;
        }

        .feature-icon {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .feature h3 {
            font-size: 0.95rem;
            margin-bottom: 6px;
            font-weight: 600;
            color: #fff;
        }

        .feature p {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.75);
            line-height: 1.5;
        }

        /* Footer */
        footer {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 32px 0 40px;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.82rem;
        }

        footer a {
            color: rgba(255, 255, 255, 0.75);
            text-decoration: none;
        }

        footer a:hover { color: #fff; }

        .footer-links { margin-bottom: 10px; }
        .footer-links a { margin: 0 12px; }

        .icon-github { width: 16px; height: 16px; fill: currentColor; }

        /* Responsive */
        @media (max-width: 600px) {
            .hero { padding: 56px 0 32px; }
            .hero h1 { font-size: 1.6rem; }
            .hero p { font-size: 0.95rem; }
            .app-card { padding: 24px; }
            .app-header { flex-direction: column; text-align: center; }
            .app-links { justify-content: center; }
            .tags { justify-content: center; }
            .platforms { justify-content: center; }
            .features { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<a href="#main" class="skip-link">Zum Inhalt springen</a>

<!-- Accessibility Toolbar -->
<div class="a11y-bar" role="toolbar" aria-label="Barrierefreiheit">
    <button class="a11y-btn" id="btn-font-down" title="Schrift verkleinern" aria-label="Schrift verkleinern">A&#8595;</button>
    <button class="a11y-btn" id="btn-font-up" title="Schrift vergrößern" aria-label="Schrift vergrößern">A&#8593;</button>
    <button class="a11y-btn" id="btn-contrast" title="Hoher Kontrast" aria-label="Hoher Kontrast umschalten">&#9681;</button>
</div>

<div class="page-bg" aria-hidden="true"></div>

<div class="page-content">

    <!-- Hero -->
    <header class="hero">
        <div class="container">
            <h1>Digitale Werkzeuge f&uuml;r die Sozialhilfe</h1>
            <p>Apps f&uuml;r Fachkr&auml;fte im Sozial- und Gesundheitswesen. Frei verf&uuml;gbar, offline nutzbar, datenschutzkonform.</p>
        </div>
    </header>

    <!-- App -->
    <main id="main">
    <section style="padding-bottom: 32px;">
        <div class="container">

            <a href="icf-klassifikation.html" class="app-card app-card-link">
                <div class="app-header">
                    <img src="icf-icon.png" alt="ICF Klassifikation App Icon" class="app-icon">
                    <div>
                        <h2>ICF Klassifikation</h2>
                        <p class="subtitle">Nachschlagewerk der WHO-Klassifikation</p>
                    </div>
                    <svg class="chevron" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
                </div>
            </a>

        </div>
    </section>

    </main>

    <!-- Footer -->
    <footer>
        <div class="container">
            <nav class="footer-links" aria-label="Rechtliches">
                <a href="impressum.html">Impressum</a>
                <a href="datenschutz.html">Datenschutz</a>
                <a href="https://github.com/miri2577/icf-klassifikation" target="_blank" rel="noopener">GitHub</a>
            </nav>
            <p>&copy; 2026 Mirko Richter &middot; Berlin</p>
        </div>
    </footer>

</div>

<script>
(function() {
    var fontLevel = parseInt(localStorage.getItem('a11y-font') || '0');
    var contrast = localStorage.getItem('a11y-contrast') === '1';

    function applyFont() {
        document.body.classList.remove('font-large', 'font-xlarge');
        if (fontLevel === 1) document.body.classList.add('font-large');
        if (fontLevel >= 2) document.body.classList.add('font-xlarge');
        localStorage.setItem('a11y-font', fontLevel);
    }

    function applyContrast() {
        document.body.classList.toggle('high-contrast', contrast);
        document.getElementById('btn-contrast').classList.toggle('active', contrast);
        localStorage.setItem('a11y-contrast', contrast ? '1' : '0');
    }

    applyFont();
    applyContrast();

    document.getElementById('btn-font-up').addEventListener('click', function() {
        if (fontLevel < 2) fontLevel++;
        applyFont();
    });

    document.getElementById('btn-font-down').addEventListener('click', function() {
        if (fontLevel > 0) fontLevel--;
        applyFont();
    });

    document.getElementById('btn-contrast').addEventListener('click', function() {
        contrast = !contrast;
        applyContrast();
    });
})();
</script>
</body>
</html>
