<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A9D8F"/>
      <stop offset="100%" style="stop-color:#1A7A6E"/>
    </linearGradient>
    <linearGradient id="circle1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.95)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.75)"/>
    </linearGradient>
    <linearGradient id="circle2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.65)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.45)"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="220" ry="220" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

  <!-- Left circle (Betreuer) - zentriert -->
  <circle cx="430" cy="460" r="170" fill="none" stroke="url(#circle1)" stroke-width="40" opacity="0.9"/>
  <!-- Right circle (Klient) - overlapping, zentriert -->
  <circle cx="594" cy="460" r="170" fill="none" stroke="url(#circle2)" stroke-width="40" opacity="0.8"/>

  <!-- Overlap highlight -->
  <clipPath id="clipLeft">
    <circle cx="430" cy="460" r="170"/>
  </clipPath>
  <circle cx="594" cy="460" r="170" clip-path="url(#clipLeft)" fill="rgba(255,255,255,0.12)"/>

  <!-- Verbindungspunkte in Overlap -->
  <circle cx="512" cy="425" r="8" fill="rgba(255,255,255,0.5)"/>
  <circle cx="512" cy="460" r="8" fill="rgba(255,255,255,0.5)"/>
  <circle cx="512" cy="495" r="8" fill="rgba(255,255,255,0.5)"/>

  <!-- Laptop unten mittig -->
  <g transform="translate(512, 690)">
    <!-- Laptop Bildschirm -->
    <rect x="-80" y="-50" width="160" height="100" rx="8" fill="rgba(255,255,255,0.15)" stroke="#1a1a1a" stroke-width="5"/>
    <!-- Bildschirm-Inhalt (kleine Linien) -->
    <line x1="-50" y1="-25" x2="20" y2="-25" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <line x1="-50" y1="-10" x2="50" y2="-10" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <line x1="-50" y1="5" x2="35" y2="5" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <line x1="-50" y1="20" x2="45" y2="20" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <!-- Laptop Basis/Tastatur -->
    <path d="M-95,54 L-80,50 L80,50 L95,54 L95,62 C95,66 92,68 88,68 L-88,68 C-92,68 -95,66 -95,62 Z" fill="rgba(255,255,255,0.5)"/>
    <!-- Touchpad -->
    <rect x="-20" y="55" width="40" height="8" rx="3" fill="rgba(255,255,255,0.3)"/>
  </g>
</svg>
